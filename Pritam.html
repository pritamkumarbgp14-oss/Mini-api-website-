<?php
if(isset($_GET['number'])){

    try{

        $number = urlencode($_GET['number']);

        $url = "http://localhost/mini-api/api/square.php?number=".$number;

        $response = file_get_contents($url);

        if($response === FALSE){
            throw new Exception("API not available.");
        }

        $data = json_decode($response,true);

        if(!$data){
            throw new Exception("Invalid JSON received.");
        }

        $cleanInput = htmlspecialchars($_GET['number']);

        echo "<h3>Result</h3>";
        echo "<p>Input: ".$cleanInput."</p>";
        echo "<p>Square: ".$data['square']."</p>";

    }catch(Exception $e){

        echo "<div class='error'>";
        echo "Sorry! Something went wrong.<br>";
        echo htmlspecialchars($e->getMessage());
        echo "</div>";
    }
}
